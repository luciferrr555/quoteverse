services:
  - type: web
    name: quoteverse
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python seed_data.py
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
