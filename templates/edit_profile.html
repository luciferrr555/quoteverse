{% extends "base.html" %}
{% block title %}Edit Profile — QuoteVerse{% endblock %}
{% block content %}
<div class="container page-container" style="max-width:500px;">
    <div class="page-header">
        <h1 class="page-title">✏️ <span class="gradient-text">Edit Profile</span></h1>
    </div>
    <div class="submit-card glass-card">
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" class="ai-textarea" rows="3" placeholder="Tell the world who you are..." maxlength="300">{{ current_user.bio }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Save Changes</button>
            <a href="/profile/{{ current_user.username }}" class="btn btn-ghost btn-full" style="margin-top:0.5rem;">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
