<div class="quote-card" data-id="{{ q.id }}" data-color="{{ category_colors.get(q.category, '#6366f1') }}" style="--card-color: {{ category_colors.get(q.category, '#6366f1') }}">
    <div class="card-glow"></div>
    <div class="card-header">
        <span class="category-badge" style="background: {{ category_colors.get(q.category, '#6366f1') }}22; color: {{ category_colors.get(q.category, '#6366f1') }}; border-color: {{ category_colors.get(q.category, '#6366f1') }}44;">
            {{ category_icons.get(q.category, '📝') }} {{ q.category }}
        </span>
        <span class="quote-views"><i class="fas fa-eye"></i> {{ q.views }}</span>
    </div>
    <blockquote class="quote-text">{{ q.text }}</blockquote>
    <div class="quote-author">— {{ q.author }}</div>
    <div class="card-actions">
        <button class="action-btn like-btn {% if current_user.is_authenticated and current_user.has_liked(q.id) %}liked{% endif %}"
                onclick="toggleLike({{ q.id }}, this)"
                title="Like">
            <i class="fas fa-heart"></i>
            <span class="like-count">{{ q.likes_count }}</span>
        </button>
        <button class="action-btn save-btn {% if current_user.is_authenticated and current_user.has_favorited(q.id) %}saved{% endif %}"
                onclick="toggleFavorite({{ q.id }}, this)"
                title="Save to Favorites">
            <i class="fas fa-star"></i>
        </button>
        <button class="action-btn comment-btn"
                onclick="openCommentModal({{ q.id }})"
                title="Comments">
            <i class="fas fa-comment"></i>
            <span>{{ q.comments_count }}</span>
        </button>
        <button class="action-btn copy-btn"
                onclick="copyQuote('{{ q.text|replace("'", "\\'") }}', this)"
                title="Copy Quote">
            <i class="fas fa-copy"></i>
        </button>
        <button class="action-btn download-btn"
                onclick="openImageModal('{{ q.text|replace("'", "\\'") }}', '{{ q.author }}')"
                title="Download as Image">
            <i class="fas fa-image"></i>
        </button>
        <div class="share-dropdown">
            <button class="action-btn share-btn" title="Share">
                <i class="fas fa-share-alt"></i>
            </button>
            <div class="share-menu">
                <a href="https://wa.me/?text={{ (q.text + ' — ' + q.author)|urlencode }}" target="_blank" class="share-item whatsapp">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
                <a href="https://twitter.com/intent/tweet?text={{ (q.text + ' — ' + q.author)|urlencode }}&hashtags=QuoteVerse,motivation" target="_blank" class="share-item twitter">
                    <i class="fab fa-x-twitter"></i> Twitter/X
                </a>
                <button class="share-item instagram" onclick="copyCaption('{{ q.text|replace("'", "\\'") }}')">
                    <i class="fab fa-instagram"></i> Copy Caption
                </button>
                <a href="/quote/{{ q.slug }}" class="share-item link">
                    <i class="fas fa-link"></i> Copy Link
                </a>
            </div>
        </div>
    </div>
</div>
