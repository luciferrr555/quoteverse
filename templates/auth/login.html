{% extends "base.html" %}
{% block title %}Login — QuoteVerse{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <a href="/" class="auth-brand">✨ QuoteVerse</a>
            <h1>Welcome back</h1>
            <p>Login to like, save, and create quotes</p>
        </div>
        <form method="POST" class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="identifier">Email or Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="identifier" name="identifier" placeholder="your@email.com or username" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePwd('password')"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="form-row">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> Remember me
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Login →</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="/auth/register">Sign up free</a>
        </div>
    </div>
    <div class="auth-bg-quote">
        <blockquote>"The secret of getting ahead is getting started."</blockquote>
        <cite>— Mark Twain</cite>
    </div>
</div>
<script>
function togglePwd(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
